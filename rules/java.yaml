# JJWT library — quantum-vulnerable JWT signing algorithm enums (source: jwtk/jjwt)
- id: java-jjwt-rsa-alg
  language: java
  pattern: 'SignatureAlgorithm\.(RS256|RS384|RS512|PS256|PS384|PS512)'
  algorithm: RSA
  quantum_threat: shor-broken
  primitive: signature
  severity: HIGH
  message: JJWT RSA/RSASSA-PSS signing algorithm is quantum-vulnerable
  migration: >
    No standardized PQC JWT algorithms exist yet. Track IETF JOSE WG for ML-DSA (FIPS 204)
    JWT algorithm identifiers, and plan migration away from RS*/PS* algorithm strings.
  metadata:
    cwe: CWE-327
    references: [NIST FIPS 204]

- id: java-jjwt-ecdsa-alg
  language: java
  pattern: 'SignatureAlgorithm\.(ES256|ES384|ES512)'
