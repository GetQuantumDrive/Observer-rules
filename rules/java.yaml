# Java PQC detection rules
# Covers: JCA (Java Cryptography Architecture) + Bouncy Castle
# Reference: NIST FIPS 203 (ML-KEM), NIST FIPS 204 (ML-DSA)

- id: java-rsa-keygen
  language: java
  pattern: 'KeyPairGenerator\.getInstance\s*\(\s*["'']RSA["'']'
  algorithm: RSA
  quantum_threat: shor-broken
  primitive: asymmetric-encryption
  severity: HIGH
  message: RSA key generation is quantum-vulnerable
  migration: >
    Replace with ML-DSA (FIPS 204) for signing or ML-KEM (FIPS 203) for key encapsulation.
    Bouncy Castle: org.bouncycastle.pqc.crypto.mlkem / org.bouncycastle.pqc.crypto.mldsa
  metadata:
    semgrep_id: java.lang.security.crypto.rsa-key-size.rsa-key-size
    cwe: CWE-327
    references: [NIST FIPS 203, NIST FIPS 204]

- id: java-rsa-cipher
  language: java
  pattern: 'Cipher\.getInstance\s*\(\s*["'']RSA'
  algorithm: RSA
  quantum_threat: shor-broken
  primitive: asymmetric-encryption
  severity: HIGH
  message: RSA cipher is quantum-vulnerable
  migration: >
    Replace with ML-KEM (FIPS 203) for key encapsulation.
    RSA encryption is discouraged even classically (PKCS#1 v1.5 padding is vulnerable).
  metadata:
    cwe: CWE-327
    references: [NIST FIPS 203]

- id: java-ecdh
  language: java
  pattern: 'KeyAgreement\.getInstance\s*\(\s*["'']ECDH["'']'
  algorithm: ECDH
  quantum_threat: shor-broken
  primitive: key-exchange
  severity: HIGH
  message: ECDH key agreement is quantum-vulnerable
  migration: Replace with ML-KEM (FIPS 203) for key encapsulation.
  metadata:
    cwe: CWE-327
    references: [NIST FIPS 203]

- id: java-ecdsa
  language: java
  pattern: 'KeyPairGenerator\.getInstance\s*\(\s*["'']EC["'']'
  algorithm: ECDSA
  quantum_threat: shor-broken
  primitive: signature
  severity: HIGH
  message: EC key generation is quantum-vulnerable (covers both ECDSA and ECDH)
  migration: >
    For digital signatures: replace with ML-DSA (FIPS 204).
    For key agreement: replace with ML-KEM (FIPS 203).
  metadata:
    semgrep_id: java.lang.security.crypto.ec-key-usage.ec-key-usage
    cwe: CWE-327
    references: [NIST FIPS 203, NIST FIPS 204]

- id: java-sha1-signature
  language: java
  pattern: 'Signature\.getInstance\s*\(\s*["'']SHA1with'
  algorithm: SHA-1
  quantum_threat: classical-broken
  primitive: signature
  severity: HIGH
  message: SHA-1 signature scheme is classically broken and quantum-vulnerable
  migration: >
    Replace with ML-DSA (FIPS 204). At minimum SHA256withRSA is needed for
    classical security, but full PQC migration is required for quantum safety.
  metadata:
    cwe: CWE-328
    references: [NIST FIPS 204, NIST SP 800-131A]

- id: java-dsa
  language: java
  pattern: 'KeyPairGenerator\.getInstance\s*\(\s*["'']DSA["'']'
